name: Validate Runtime

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-runtime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate runtime parity and bundle gating
        run: python scripts/validate_runtime.py
