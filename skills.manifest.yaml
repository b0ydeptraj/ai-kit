version: 0.2
philosophy: hub-and-spoke-runtime
objective: >-
  Keep the active relay-kit runtime adapter-neutral at the skill layer with Relay-kit-only
  naming and strict runtime bundle contracts.

conventions:
  handoff_contract_required:
    - objective
    - current_state
    - evidence
    - affected_files
    - constraints
    - assumptions
    - proposed_next_step
    - validation_plan
    - risks
  state_files:
    workflow_state: .relay-kit/state/workflow-state.md
    team_board: .relay-kit/state/team-board.md
    lane_registry: .relay-kit/state/lane-registry.md
    handoff_log: .relay-kit/state/handoff-log.md
  execution_rules:
    - Treat `.claude/skills`, `.agent/skills`, and `.codex/skills` as the active runtime surfaces.
    - Utility providers are stateless and should not own project strategy or lane state.
    - Route through layer-1 orchestrators and layer-2 hubs before invoking specialists directly.
    - For v4 bundles, `--ai all` targets `.claude/skills`, `.agent/skills`, and `.codex/skills`.

layers:
  layer_1_orchestrators:
    - workflow-router
    - bootstrap
    - team
    - cook
  layer_2_workflow_hubs:
    - brainstorm-hub
    - scout-hub
    - plan-hub
    - debug-hub
    - fix-hub
    - test-hub
    - review-hub
  layer_3_utility_providers:
    - research
    - doc-pointers
    - sequential-thinking
    - problem-solving
    - multimodal-evidence
    - browser-inspector
    - repo-map
    - memory-search
    - release-readiness
    - accessibility-review
    - skill-gauntlet
    - impact-radar
    - runtime-doctor
    - migration-guard
    - context-continuity
    - handoff-context
    - mermaid-diagrams
    - ux-structure
    - media-tooling
  optional_discipline_overlays:
    - root-cause-debugging
    - test-first-development
    - evidence-before-completion
    - skill-evolution
  layer_4_specialists_and_standalones:
    - analyst
    - pm
    - architect
    - scrum-master
    - developer
    - qa-governor
    - execution-loop
    - project-architecture
    - dependency-management
    - api-integration
    - data-persistence
    - testing-patterns

bundles:
  active_baselines:
    - core
    - orchestration
    - runtime
    - baseline
    - enterprise
  additive_overlays:
    - utility-providers
    - discipline-utilities
  notes:
    - baseline is the current baseline.
    - runtime is the full non-enterprise runtime bundle.
    - core and orchestration remain available as narrower deterministic runtime slices.
    - enterprise is the paid/team governance bundle with the full discipline utility set.
    - discipline-utilities remains optional until a future baseline absorbs approved skills.

adapter_runtime:
  claude:
    skill_root: .claude/skills
    model: runtime-skills-only
  antigravity:
    skill_root: .agent/skills
    model: runtime-skills-only
    note: serves as the active runtime target for Antigravity-style usage
  codex:
    skill_root: .codex/skills
    model: runtime-skills-only
    note: keep Codex as a skill surface, not a legacy command or workflow surface

runtime_policy:
  naming_mode: relay-kit-only
  notes:
    - Compatibility aliases and legacy bundle labels are hard-blocked by naming guard.
    - Runtime generation and diagnostics must use canonical Relay-kit bundle names only.
