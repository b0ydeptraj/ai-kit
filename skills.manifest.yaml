version: 0.1
philosophy: mesh-not-islands
objective: >-
  Turn ai-kit from a broad skill catalog into a mesh ecosystem with a small orchestration spine,
  shared handoff contracts, and reusable utility providers.

conventions:
  handoff_contract_required:
    - objective
    - current_state
    - evidence
    - affected_files
    - constraints
    - assumptions
    - proposed_next_step
    - validation_plan
    - risks
  state_files:
    plan: .ai-kit/state/plan.md
    routes: .ai-kit/state/routes.json
    findings: .ai-kit/state/findings.md
    review: .ai-kit/state/review.md
  execution_rules:
    - Prefer orchestration through workflow hubs over direct expert invocation.
    - Utility providers are stateless and should not own project strategy.
    - Domain experts should implement or advise narrowly within their specialty.
    - Every complex task should leave behind a current plan and validation trail.

tiers:
  orchestrators:
    - cook
  workflow_hubs:
    - plan
    - scout
    - debug
    - fix
    - validate
    - review
    - brainstorm
  utility_providers:
    - docs-seeker
    - repomix
    - chrome-devtools
    - ai-multimodal
    - context-engineering
    - mcp-management
    - mermaidjs-v11
    - media-processing
  domain_experts:
    - react-expert
    - nextjs-expert
    - nodejs-expert
    - nestjs-expert
    - backend-development
    - rest-api-expert
    - auth-expert
    - database-expert
    - postgres-expert
    - mongodb-expert
    - prisma-expert
    - typescript-expert
    - typescript-type-expert
    - accessibility-expert
    - css-styling-expert
    - state-management-expert
    - playwright-expert
    - jest-testing-expert
    - vitest-testing-expert
    - vite-expert
    - webpack-expert
    - docker-expert
    - devops-expert
    - github-actions-expert
    - git-expert

profiles:
  coding-core:
    include:
      - cook
      - plan
      - scout
      - debug
      - fix
      - validate
      - review
      - brainstorm
      - docs-seeker
      - repomix
      - context-engineering
      - triage-expert
      - testing-expert
      - git-expert
      - typescript-expert
      - typescript-type-expert
  frontend-app:
    extends: coding-core
    include:
      - react-expert
      - nextjs-expert
      - vite-expert
      - webpack-expert
      - state-management-expert
      - accessibility-expert
      - css-styling-expert
      - chrome-devtools
      - ai-multimodal
      - aesthetic
  backend-app:
    extends: coding-core
    include:
      - backend-development
      - nodejs-expert
      - nestjs-expert
      - rest-api-expert
      - auth-expert
      - database-expert
      - postgres-expert
      - mongodb-expert
      - prisma-expert
      - docker-expert
      - devops-expert
      - github-actions-expert
  fullstack-web:
    extends:
      - frontend-app
      - backend-app
    include:
      - mcp-management
      - mermaidjs-v11

routing:
  cook:
    role: primary_entrypoint
    delegates_to:
      - plan
      - scout
      - debug
      - fix
      - validate
      - review
    state_files:
      - .ai-kit/state/plan.md
      - .ai-kit/state/routes.json
  plan:
    role: architecture_and_execution_design
    delegates_to:
      - scout
      - docs-seeker
      - repomix
      - brainstorm
      - context-engineering
      - mermaidjs-v11
  scout:
    role: codebase_mapping_and_impact_analysis
    delegates_to:
      - repomix
      - context-engineering
      - docs-seeker
  debug:
    role: root_cause_and_failure_analysis
    delegates_to:
      - triage-expert
      - docs-seeker
      - chrome-devtools
      - mcp-management
  fix:
    role: implementation_hub
    delegates_to:
      - react-expert
      - nextjs-expert
      - typescript-expert
      - typescript-type-expert
      - backend-development
      - nodejs-expert
      - nestjs-expert
      - auth-expert
      - database-expert
      - postgres-expert
      - mongodb-expert
      - prisma-expert
      - rest-api-expert
      - docker-expert
      - devops-expert
      - accessibility-expert
      - css-styling-expert
      - state-management-expert
  validate:
    role: test_and_quality_validation
    delegates_to:
      - testing-expert
      - jest-testing-expert
      - vitest-testing-expert
      - playwright-expert
      - chrome-devtools
      - ai-multimodal
  review:
    role: risk_edge_case_and_regression_review
    delegates_to:
      - scout
      - validate
      - typescript-type-expert
      - accessibility-expert
      - git-expert
  brainstorm:
    role: option_generation_and_tradeoff_analysis
    delegates_to:
      - plan
      - docs-seeker
      - backend-development
      - aesthetic
      - frontend-design
      - mermaidjs-v11

rollout:
  phase_1:
    - Add manifest and seven workflow hubs plus cook.
    - Keep existing experts intact.
    - Add simple command layer mapping /cook /debug /review /ship to hubs.
  phase_2:
    - Refactor triage-expert into debug provider or keep as delegate under debug.
    - Refactor testing-expert into validate provider or keep as delegate under validate.
    - Split broad umbrellas only when routing noise becomes measurable.
  phase_3:
    - Add metrics: route frequency, failure loops, validation coverage, average skills per task.
    - Introduce team/bootstrap only after single-agent flow is stable.
