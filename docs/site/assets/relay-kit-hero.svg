<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">Relay-kit runtime skill system</title>
  <desc id="desc">A dark Relay-kit banner showing routing, context graph, evidence gates, and adapter outputs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.42" stop-color="#10253d"/>
      <stop offset="0.72" stop-color="#142c2b"/>
      <stop offset="1" stop-color="#20133a"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#66e3ff"/>
      <stop offset="0.52" stop-color="#9aff7a"/>
      <stop offset="1" stop-color="#ffcf5a"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.25 0 0 0 0 0.85 0 0 0 0 1 0 0 0 0.5 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M 34 0 L 0 0 0 34" fill="none" stroke="#ffffff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1400" height="420" rx="28" fill="url(#bg)"/>
  <rect width="1400" height="420" rx="28" fill="url(#grid)"/>
  <path d="M80 306 C210 168 326 120 462 184 C574 236 640 272 752 214 C860 158 920 92 1042 130 C1158 166 1240 274 1324 198" fill="none" stroke="url(#edge)" stroke-width="4" stroke-opacity="0.72" filter="url(#glow)"/>
  <g opacity="0.92">
    <circle cx="238" cy="196" r="44" fill="#0e2638" stroke="#66e3ff" stroke-width="2"/>
    <circle cx="510" cy="218" r="48" fill="#112f2c" stroke="#9aff7a" stroke-width="2"/>
    <circle cx="790" cy="182" r="44" fill="#2b2540" stroke="#b69cff" stroke-width="2"/>
    <circle cx="1056" cy="162" r="48" fill="#302618" stroke="#ffcf5a" stroke-width="2"/>
  </g>
  <g fill="#eaf6ff" font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="74" y="92" font-size="52" font-weight="800" letter-spacing="0">Relay-kit</text>
    <text x="78" y="135" font-size="21" fill="#b7d5ea">Runtime skills, local context, and evidence gates for coding agents.</text>
    <text x="210" y="202" font-size="17" font-weight="700" text-anchor="middle">Route</text>
    <text x="210" y="226" font-size="13" fill="#a6cfe6" text-anchor="middle">ask / scout / act</text>
    <text x="510" y="218" font-size="17" font-weight="700" text-anchor="middle">Context</text>
    <text x="510" y="242" font-size="13" fill="#b6eec1" text-anchor="middle">file + symbol + test</text>
    <text x="790" y="180" font-size="17" font-weight="700" text-anchor="middle">Battle</text>
    <text x="790" y="204" font-size="13" fill="#d5c8ff" text-anchor="middle">competency proof</text>
    <text x="1056" y="162" font-size="17" font-weight="700" text-anchor="middle">Ship</text>
    <text x="1056" y="186" font-size="13" fill="#ffe1a0" text-anchor="middle">readiness gates</text>
  </g>
  <g font-family="JetBrains Mono, Consolas, monospace" font-size="15" fill="#d8f4ff">
    <rect x="76" y="282" width="312" height="70" rx="14" fill="#07111f" fill-opacity="0.72" stroke="#66e3ff" stroke-opacity="0.35"/>
    <text x="98" y="313">relay-kit prompt enhance</text>
    <text x="98" y="338" fill="#91b7c7">short prompt -> working plan</text>
    <rect x="430" y="302" width="280" height="58" rx="14" fill="#07111f" fill-opacity="0.72" stroke="#9aff7a" stroke-opacity="0.35"/>
    <text x="452" y="337">context search / related</text>
    <rect x="756" y="282" width="246" height="70" rx="14" fill="#07111f" fill-opacity="0.72" stroke="#b69cff" stroke-opacity="0.35"/>
    <text x="778" y="313">skill-battle: 10/10</text>
    <text x="778" y="338" fill="#bfaeff">only when evidence passes</text>
    <rect x="1050" y="282" width="270" height="70" rx="14" fill="#07111f" fill-opacity="0.72" stroke="#ffcf5a" stroke-opacity="0.35"/>
    <text x="1072" y="313">.codex .claude .agent</text>
    <text x="1072" y="338" fill="#ffd88f">portable adapter surfaces</text>
  </g>
  <g opacity="0.35" fill="none" stroke="#ffffff" stroke-width="1">
    <path d="M1198 58 h96 v30 h-96z"/>
    <path d="M1160 96 h134 v30 h-134z"/>
    <path d="M1198 134 h96 v30 h-96z"/>
  </g>
</svg>
